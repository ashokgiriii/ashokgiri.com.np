<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashok Giri</title>
  <style>
    :root {
      color-scheme: dark;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .video-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.88) contrast(1.05) saturate(1.05);
      transform: scale(1.02);
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.35)),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.35));
      pointer-events: none;
    }

    .intro-copy {
      position: absolute;
      left: 2rem;
      bottom: 2rem;
      z-index: 1;
      max-width: min(26rem, calc(100vw - 9rem));
      color: #fff8ef;
      text-shadow: 0 6px 22px rgba(0, 0, 0, 0.45);
    }

    .intro-copy p {
      font-size: clamp(0.95rem, 1.3vw, 1.05rem);
      line-height: 1.5;
      opacity: 0.9;
    }

    .intro-copy strong {
      display: block;
      margin-bottom: 0.5rem;
      font-size: clamp(1.6rem, 3.5vw, 3rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .egg-launcher {
      position: fixed;
      right: 1.5rem;
      bottom: 1.5rem;
      z-index: 2;
      width: 6.5rem;
      height: 6.5rem;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
      touch-action: manipulation;
    }

    .egg-launcher:focus-visible {
      outline: 3px solid rgba(255, 248, 220, 0.85);
      outline-offset: 6px;
      border-radius: 999px;
    }

    .egg-shell {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
      filter: drop-shadow(var(--shadow));
    }

    .egg-half {
      display: block;
      position: absolute;
      left: 50%;
      width: 76%;
      height: 88%;
      background: linear-gradient(180deg, #fffdf7 0%, #f5e6c8 100%);
      border: 2px solid rgba(98, 71, 32, 0.18);
      transition:
        transform 0.6s ease,
        opacity 0.35s ease;
    }

    .egg-half::after {
      content: "";
      position: absolute;
      inset: 11% 14%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.34);
      filter: blur(7px);
    }

    .egg-half.left {
      top: 6%;
      transform: translateX(-96%) rotate(-6deg);
      border-radius: 58% 42% 48% 52% / 58% 50% 50% 42%;
      clip-path: polygon(0 0, 100% 0, 100% 61%, 82% 69%, 95% 79%, 75% 88%, 88% 100%, 0 100%);
    }

    .egg-half.right {
      top: 6%;
      transform: translateX(-4%) rotate(6deg);
      border-radius: 42% 58% 52% 48% / 50% 58% 42% 50%;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 13% 100%, 24% 88%, 5% 79%, 18% 69%, 0 61%);
    }

    .egg-yolk {
      display: block;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34%;
      height: 34%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffe79f 0%, #ffc532 50%, #f59e0b 100%);
      transform: translate(-50%, -42%);
      box-shadow:
        inset 0 -10px 18px rgba(186, 96, 8, 0.24),
        0 10px 18px rgba(0, 0, 0, 0.15);
      transition:
        transform 0.5s ease,
        opacity 0.25s ease;
    }

    .egg-label {
      position: absolute;
      left: 50%;
      bottom: -1.55rem;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff6dd;
      opacity: 0.95;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
    }

    .egg-launcher:hover .egg-shell,
    .egg-launcher:focus-visible .egg-shell {
      transform: translateY(-4px) scale(1.02);
    }

    .egg-launcher.cracking {
      pointer-events: none;
    }

    .egg-launcher.cracking .egg-half.left {
      transform: translateX(-142%) translateY(-24%) rotate(-35deg);
      opacity: 0.96;
    }

    .egg-launcher.cracking .egg-half.right {
      transform: translateX(40%) translateY(-24%) rotate(35deg);
      opacity: 0.96;
    }

    .egg-launcher.cracking .egg-yolk {
      transform: translate(-50%, 95%) scale(0.85);
      opacity: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .egg-half,
      .egg-yolk,
      .egg-shell {
        transition: none;
      }
    }

    @media (max-width: 640px) {
      .intro-copy {
        left: 1rem;
        bottom: 1rem;
        max-width: calc(100vw - 7.5rem);
      }

      .egg-launcher {
        right: 1rem;
        bottom: 1rem;
        width: 5.5rem;
        height: 5.5rem;
      }
    }
  </style>
</head>

    <video autoplay muted loop playsinline preload="auto" aria-hidden="true">

    </video>
</div>
    

  

    

  
</body>
</html>
