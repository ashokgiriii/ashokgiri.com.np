services:
  - type: web
    name: ashokgiri-portfolio
    runtime: node
    buildCommand: npm install && npm run build:css
    startCommand: npm start
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: "noreply@ashokgiri.com.np"
      - key: CONTACT_RECEIVER
        value: "ashokgiri.dev@gmail.com"
      - key: NODE_ENV
        value: production
